name: build-frontend-world
run-name: Building Frontend Image for World Deploy
on:
  workflow_dispatch:

env:
  IMAGE_NAME: rives-frontend-nv2

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment: WorldChain

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .env
        env:
          DOT_ENV_VARIABLES: >-
            INVITE_CODE_KEY
            NEXT_PUBLIC_CARTESI_NODE_URL
            NEXT_PUBLIC_DAPP_ADDR
            NEXT_PUBLIC_DEPLOYMENT_URL
            NEXT_PUBLIC_GIF_SERVER_URL
            NEXT_PUBLIC_NETWORK_CHAIN_ID
            NEXT_PUBLIC_OPERATOR_ADDR
            NEXT_PUBLIC_CARTRIDGES_URL
            PRIVY_APP_ID
            PRIVY_APP_SECRET
          INVITE_CODE_KEY: ${{ secrets.INVITE_CODE_KEY }}
          NEXT_PUBLIC_CARTESI_NODE_URL: ${{ vars.NEXT_PUBLIC_CARTESI_NODE_URL }}
          NEXT_PUBLIC_DAPP_ADDR: ${{ vars.NEXT_PUBLIC_DAPP_ADDR }}
          NEXT_PUBLIC_DEPLOYMENT_URL: ${{ vars.NEXT_PUBLIC_DEPLOYMENT_URL }}
          NEXT_PUBLIC_GIF_SERVER_URL: ${{ vars.NEXT_PUBLIC_GIF_SERVER_URL }}
          NEXT_PUBLIC_NETWORK_CHAIN_ID: ${{ vars.NEXT_PUBLIC_NETWORK_CHAIN_ID }}
          NEXT_PUBLIC_OPERATOR_ADDR: ${{ vars.NEXT_PUBLIC_OPERATOR_ADDR }}
          NEXT_PUBLIC_CARTRIDGES_URL: ${{ vars.NEXT_PUBLIC_CARTRIDGES_URL }}
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
        run: |
          rm .env
          for var in $DOT_ENV_VARIABLES; do
            echo $var=${!var} >> .env
          done
          echo Final .env:
          cat .env
          echo "APP_VERSION=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Node Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.APP_VERSION }}-world
            type=sha
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=Rives Frontend NodeV2
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=${{ github.repository }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Image Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: .
          file: ./Dockerfile
          push: true
